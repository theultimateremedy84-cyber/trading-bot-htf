openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ICT Trading Bot API — Capital.com integration
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bot
    description: Bot lifecycle management
  - name: positions
    description: Open positions
  - name: trades
    description: Trade history
  - name: signals
    description: ICT signals
  - name: markets
    description: Market data
  - name: performance
    description: Performance and P&L
  - name: settings
    description: Bot settings
  - name: account
    description: Capital.com account

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /bot/status:
    get:
      operationId: getBotStatus
      tags: [bot]
      summary: Get bot running status
      responses:
        "200":
          description: Bot status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /bot/start:
    post:
      operationId: startBot
      tags: [bot]
      summary: Start the trading bot
      responses:
        "200":
          description: Bot started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /bot/stop:
    post:
      operationId: stopBot
      tags: [bot]
      summary: Stop the trading bot
      responses:
        "200":
          description: Bot stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /positions:
    get:
      operationId: getPositions
      tags: [positions]
      summary: List all open positions from Capital.com
      responses:
        "200":
          description: List of open positions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Position"

  /positions/{dealId}:
    delete:
      operationId: closePosition
      tags: [positions]
      summary: Manually close an open position
      parameters:
        - name: dealId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Position closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloseResult"
        "404":
          description: Position not found

  /trades:
    get:
      operationId: getTrades
      tags: [trades]
      summary: Get trade history
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: market
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Trade history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trade"

  /signals:
    get:
      operationId: getSignals
      tags: [signals]
      summary: Get recent ICT signals
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: market
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Recent ICT signals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Signal"

  /markets:
    get:
      operationId: getMarkets
      tags: [markets]
      summary: Get monitored markets with current prices
      responses:
        "200":
          description: List of monitored markets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Market"

  /performance:
    get:
      operationId: getPerformance
      tags: [performance]
      summary: Get P&L and performance stats
      responses:
        "200":
          description: Performance statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Performance"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get current bot settings
      responses:
        "200":
          description: Bot settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotSettings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update bot settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotSettingsInput"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotSettings"

  /account:
    get:
      operationId: getAccount
      tags: [account]
      summary: Get Capital.com account info
      responses:
        "200":
          description: Account information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    BotStatus:
      type: object
      required: [running, uptime, lastScan, openPositions, activeMarkets, sessionValid]
      properties:
        running:
          type: boolean
        uptime:
          type: ["integer", "null"]
          description: Uptime in seconds
        lastScan:
          type: ["string", "null"]
          description: ISO timestamp of last market scan
        openPositions:
          type: integer
        activeMarkets:
          type: integer
        sessionValid:
          type: boolean
        error:
          type: ["string", "null"]

    Position:
      type: object
      required: [dealId, epic, market, direction, size, openLevel, currentBid, currentOffer, profit, openDate, stopLevel, limitLevel]
      properties:
        dealId:
          type: string
        epic:
          type: string
        market:
          type: string
        direction:
          type: string
          enum: [BUY, SELL]
        size:
          type: number
        openLevel:
          type: number
        currentBid:
          type: number
        currentOffer:
          type: number
        profit:
          type: number
        openDate:
          type: string
        stopLevel:
          type: ["number", "null"]
        limitLevel:
          type: ["number", "null"]
        currency:
          type: string

    CloseResult:
      type: object
      required: [success, dealId, profit]
      properties:
        success:
          type: boolean
        dealId:
          type: string
        profit:
          type: number
        message:
          type: string

    Trade:
      type: object
      required: [id, epic, market, direction, size, entryPrice, exitPrice, profit, entryDate, exitDate, stopLoss, takeProfit, strategy, result]
      properties:
        id:
          type: integer
        epic:
          type: string
        market:
          type: string
        direction:
          type: string
          enum: [BUY, SELL]
        size:
          type: number
        entryPrice:
          type: number
        exitPrice:
          type: ["number", "null"]
        profit:
          type: ["number", "null"]
        entryDate:
          type: string
        exitDate:
          type: ["string", "null"]
        stopLoss:
          type: number
        takeProfit:
          type: number
        strategy:
          type: string
        result:
          type: ["string", "null"]
          enum: [WIN, LOSS, BREAKEVEN, null]
        riskRewardRatio:
          type: ["number", "null"]
        signalId:
          type: ["integer", "null"]

    Signal:
      type: object
      required: [id, epic, market, direction, signalType, timeframe, entryPrice, stopLoss, takeProfit, confidence, detectedAt, executed, killZone]
      properties:
        id:
          type: integer
        epic:
          type: string
        market:
          type: string
        direction:
          type: string
          enum: [BUY, SELL]
        signalType:
          type: string
          enum: [ORDER_BLOCK, FAIR_VALUE_GAP, LIQUIDITY_SWEEP, BOS, CHOCH, COMBINED]
        timeframe:
          type: string
        entryPrice:
          type: number
        stopLoss:
          type: number
        takeProfit:
          type: number
        confidence:
          type: number
          description: Confidence score 0-100
        detectedAt:
          type: string
        executed:
          type: boolean
        killZone:
          type: ["string", "null"]
          enum: [LONDON, NEW_YORK, ASIAN, null]
        notes:
          type: ["string", "null"]

    Market:
      type: object
      required: [epic, name, bid, offer, change, changePercent, high, low, marketStatus, spread, lastUpdated]
      properties:
        epic:
          type: string
        name:
          type: string
        bid:
          type: number
        offer:
          type: number
        change:
          type: number
        changePercent:
          type: number
        high:
          type: number
        low:
          type: number
        marketStatus:
          type: string
          enum: [TRADEABLE, CLOSED, OFFLINE]
        spread:
          type: number
        lastUpdated:
          type: string
        trend:
          type: string
          enum: [BULLISH, BEARISH, SIDEWAYS]
        activeSignal:
          type: ["string", "null"]

    Performance:
      type: object
      required: [totalTrades, winRate, totalPnl, todayPnl, weekPnl, monthPnl, avgRR, bestTrade, worstTrade, consecutiveWins, consecutiveLosses, sharpeRatio, maxDrawdown, byMarket]
      properties:
        totalTrades:
          type: integer
        winRate:
          type: number
        totalPnl:
          type: number
        todayPnl:
          type: number
        weekPnl:
          type: number
        monthPnl:
          type: number
        avgRR:
          type: number
        bestTrade:
          type: number
        worstTrade:
          type: number
        consecutiveWins:
          type: integer
        consecutiveLosses:
          type: integer
        sharpeRatio:
          type: ["number", "null"]
        maxDrawdown:
          type: number
        byMarket:
          type: array
          items:
            $ref: "#/components/schemas/MarketPerformance"

    MarketPerformance:
      type: object
      required: [epic, market, trades, wins, losses, pnl, winRate]
      properties:
        epic:
          type: string
        market:
          type: string
        trades:
          type: integer
        wins:
          type: integer
        losses:
          type: integer
        pnl:
          type: number
        winRate:
          type: number

    Account:
      type: object
      required: [accountId, accountName, balance, deposit, profitLoss, available, currency, status]
      properties:
        accountId:
          type: string
        accountName:
          type: string
        balance:
          type: number
        deposit:
          type: number
        profitLoss:
          type: number
        available:
          type: number
        currency:
          type: string
        status:
          type: string

    BotSettings:
      type: object
      required: [id, riskPerTrade, maxOpenTrades, dailyLossLimit, enabledMarkets, enabledKillZones, minConfidence, useOrderBlocks, useFairValueGaps, useLiquiditySweeps, useBOS, useChoCH, trailingStop, minRR, capitalApiKey, capitalIdentifier, capitalApiUrl, isDemo]
      properties:
        id:
          type: integer
        riskPerTrade:
          type: number
          description: Percentage of account balance to risk per trade
        maxOpenTrades:
          type: integer
        dailyLossLimit:
          type: number
        enabledMarkets:
          type: array
          items:
            type: string
        enabledKillZones:
          type: array
          items:
            type: string
        minConfidence:
          type: number
          description: Minimum signal confidence (0-100) to execute
        useOrderBlocks:
          type: boolean
        useFairValueGaps:
          type: boolean
        useLiquiditySweeps:
          type: boolean
        useBOS:
          type: boolean
        useChoCH:
          type: boolean
        trailingStop:
          type: boolean
        minRR:
          type: number
          description: Minimum risk-reward ratio
        capitalApiKey:
          type: string
          description: Masked API key (shown as ***)
        capitalIdentifier:
          type: string
          description: Capital.com login email (masked if set)
        capitalApiUrl:
          type: string
        isDemo:
          type: boolean

    BotSettingsInput:
      type: object
      properties:
        riskPerTrade:
          type: number
        maxOpenTrades:
          type: integer
        dailyLossLimit:
          type: number
        enabledMarkets:
          type: array
          items:
            type: string
        enabledKillZones:
          type: array
          items:
            type: string
        minConfidence:
          type: number
        useOrderBlocks:
          type: boolean
        useFairValueGaps:
          type: boolean
        useLiquiditySweeps:
          type: boolean
        useBOS:
          type: boolean
        useChoCH:
          type: boolean
        trailingStop:
          type: boolean
        minRR:
          type: number
        capitalApiKey:
          type: string
          description: Capital.com API key
        capitalIdentifier:
          type: string
          description: Capital.com login email
        capitalPassword:
          type: string
          description: Capital.com password
        capitalApiUrl:
          type: string
        isDemo:
          type: boolean
